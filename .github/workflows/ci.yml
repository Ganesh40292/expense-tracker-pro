name: Expense Tracker CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Tests (Java 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Run Backend Tests & Coverage
        working-directory: ./backend
        run: mvn test jacoco:report
        
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/target/site/jacoco/
          
  frontend-test:
    name: Frontend Tests (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Run Linter
        working-directory: ./frontend
        run: npm run lint
        
      - name: Run Vitest Unit & Component Tests
        working-directory: ./frontend
        run: npm run coverage
        
      - name: Upload Vitest Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          
  e2e-test:
    name: End-to-End Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-test] # Can run in parallel but better to wait for unit tests to pass
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps
        
      - name: Run Playwright Tests
        working-directory: ./frontend
        run: npx playwright test
        
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
