# ═══════════════════════════════════════════════════════════
#  ExpenseTracker — Production Override
#  Run: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════

services:

  mysql:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SHOW_SQL: "false"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    # Don't expose port directly in production — traffic goes through Nginx
    ports: !reset []

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
