# ═══════════════════════════════════════════════════════════
#  ExpenseTracker Frontend — Nginx Configuration
#  SPA routing + API reverse proxy + security headers
# ═══════════════════════════════════════════════════════════

upstream backend_api {
    server backend:8080;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── API Reverse Proxy ─────────────────────────────────
    # All /api/* requests are forwarded to the backend
    location /api/ {
        proxy_pass http://backend_api/api/;
        proxy_http_version 1.1;

        # Pass original client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Allow large uploads (receipts)
        client_max_body_size 10M;
    }

    # ── Static Assets Caching ─────────────────────────────
    # Hashed filenames from Vite get long-lived cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Client-Side Routing ───────────────────────────
    # All other routes fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Don't cache index.html itself
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # ── Deny hidden files ─────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
