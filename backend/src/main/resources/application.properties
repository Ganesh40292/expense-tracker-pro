spring.application.name=expense-tracker-system

# ── Database ──
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/expense_tracker}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Ganesh}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA defaults
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}

# ── JWT Configuration ──
jwt.secret=${JWT_SECRET:ExpenseTrackerSuperSecretKeyThatIsAtLeast32BytesLong2026!!}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ── Security ──
security.login.max-attempts=${MAX_LOGIN_ATTEMPTS:5}
security.login.lockout-duration-minutes=${LOCKOUT_DURATION:15}

# Server — Render assigns PORT dynamically
server.port=${PORT:8080}

# ── Frontend URL (for CORS & email links) ──
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ── Email (Gmail SMTP) ──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# App-level mail config
app.mail.from=${MAIL_USERNAME:your-email@gmail.com}
app.name=ExpenseTracker
