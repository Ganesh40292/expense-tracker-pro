# ── H2 Test Database Configuration ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ── JWT Configuration for Tests ──
jwt.secret=TestSecretKeyThatIsAtLeast32BytesLongForH2TestsOnly!!!
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

# ── Security settings for Tests ──
security.login.max-attempts=5
security.login.lockout-duration-minutes=15

# ── Frontend URL for Tests ──
app.frontend.url=http://localhost:5173

# ── Mock Mail Server for Tests ──
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test
app.mail.from=test@test.com
app.name=ExpenseTrackerTest

# ── Gemini AI Configuration for Tests ──
gemini.api.key=test-gemini-key
gemini.api.model=gemini-1.5-flash

